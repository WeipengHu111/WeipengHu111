name: GitHub Metrics

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *' # Runs daily at 1 AM UTC

jobs:
  # Detailed language breakdown (no indepth - uses GitHub API for accuracy)
  languages:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: metrics-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_threshold: "0%"
          plugin_languages_other: yes
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_colors: github
          plugin_languages_ignored: html, css, dockerfile, shell, makefile
          plugin_languages_categories: programming
          config_timezone: Australia/Sydney

  # Coding habits & schedule
  habits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          filename: metrics-habits.svg
          base: ""
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_habits_charts_type: graph
          plugin_habits_trim: yes
          plugin_habits_languages_limit: 8
          config_timezone: Australia/Sydney
