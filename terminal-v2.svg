<svg width="820" height="590" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
      @keyframes grow1 { from { width: 0; } to { width: 330; } }
      @keyframes grow2 { from { width: 0; } to { width: 320; } }
      @keyframes grow3 { from { width: 0; } to { width: 290; } }
      @keyframes grow4 { from { width: 0; } to { width: 300; } }
      @keyframes grow5 { from { width: 0; } to { width: 270; } }
      @keyframes grow6 { from { width: 0; } to { width: 280; } }
      @keyframes grow7 { from { width: 0; } to { width: 250; } }
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .cursor { animation: blink 1.2s step-end infinite; }
      .f1  { animation: fadeIn 0.3s 0.1s both; }
      .f2  { animation: fadeIn 0.3s 0.3s both; }
      .f3  { animation: fadeIn 0.3s 0.5s both; }
      .f4  { animation: fadeIn 0.3s 0.7s both; }
      .f5  { animation: fadeIn 0.3s 0.9s both; }
      .f6  { animation: fadeIn 0.3s 1.0s both; }
      .f7  { animation: fadeIn 0.3s 1.1s both; }
      .f8  { animation: fadeIn 0.3s 1.2s both; }
      .f9  { animation: fadeIn 0.3s 1.4s both; }
      .f10 { animation: fadeIn 0.3s 1.6s both; }
      .f11 { animation: fadeIn 0.3s 1.8s both; }
      .f12 { animation: fadeIn 0.3s 2.0s both; }
      .f13 { animation: fadeIn 0.3s 2.2s both; }
      .f14 { animation: fadeIn 0.3s 2.4s both; }
      .f15 { animation: fadeIn 0.3s 2.6s both; }
      .f16 { animation: fadeIn 0.3s 2.8s both; }
      .f17 { animation: fadeIn 0.3s 3.0s both; }
      .bar1 { animation: grow1 0.8s 1.9s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .bar2 { animation: grow2 0.8s 2.1s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .bar3 { animation: grow3 0.8s 2.3s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .bar4 { animation: grow4 0.8s 2.5s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .bar5 { animation: grow5 0.8s 2.7s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .bar6 { animation: grow6 0.8s 2.9s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .bar7 { animation: grow7 0.8s 3.1s cubic-bezier(0.16, 1, 0.3, 1) both; }
      .mono { font-family: ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }
    </style>
    <!-- Bar track pattern -->
    <pattern id="track" width="8" height="10" patternUnits="userSpaceOnUse">
      <rect width="8" height="10" fill="#161B22"/>
      <rect width="1" height="10" fill="#1C2333"/>
    </pattern>
  </defs>

  <!-- ===== WINDOW FRAME ===== -->
  <rect width="820" height="590" rx="12" fill="#0D1117"/>
  <rect width="820" height="38" rx="12" fill="#161B22"/>
  <rect y="26" width="820" height="12" fill="#161B22"/>

  <!-- Traffic lights -->
  <circle cx="24" cy="19" r="7" fill="#FF5F57"/>
  <circle cx="46" cy="19" r="7" fill="#FEBC2E"/>
  <circle cx="68" cy="19" r="7" fill="#28C840"/>

  <!-- Title -->
  <text x="410" y="24" text-anchor="middle" fill="#6B7280" class="mono" font-size="13">weipeng@github — htop</text>

  <!-- ===== WHO AM I ===== -->
  <text x="28" y="70" class="mono f1" font-size="14">
    <tspan fill="#22C55E">$</tspan>
    <tspan fill="#E6EDF3"> who am i</tspan>
  </text>
  <text x="28" y="92" class="mono f2" font-size="14" fill="#E6EDF3" font-weight="bold">Weipeng Hu</text>
  <text x="148" y="92" class="mono f2" font-size="14" fill="#6B7280">— Full Stack Developer</text>
  <text x="28" y="114" class="mono f3" font-size="13" fill="#6B7280">Building products from mobile to cloud. Currently exploring AI Agents.</text>

  <!-- ===== SEPARATOR 1 ===== -->
  <line x1="28" y1="130" x2="792" y2="130" stroke="#1C2333" stroke-width="1" class="f4"/>

  <!-- ===== WHAT I AM WORKING ON ===== -->
  <text x="28" y="152" class="mono f5" font-size="14">
    <tspan fill="#22C55E">$</tspan>
    <tspan fill="#E6EDF3"> cat ~/projects/active</tspan>
  </text>

  <text x="28" y="176" class="mono f6" font-size="14">
    <tspan fill="#E6EDF3" font-weight="bold">Full-Stack AI Platform</tspan>
    <tspan fill="#6B7280"> — multimodal LLM + RAG pipeline</tspan>
  </text>
  <text x="28" y="196" class="mono f7" font-size="13">
    <tspan fill="#374151">├─</tspan>
    <tspan fill="#06B6D4"> Agent</tspan>
    <tspan fill="#6B7280">   LangGraph orchestration, vision model + vector search</tspan>
  </text>
  <text x="28" y="214" class="mono f7" font-size="13">
    <tspan fill="#374151">├─</tspan>
    <tspan fill="#06B6D4"> App</tspan>
    <tspan fill="#6B7280">     Flutter cross-platform, WebSocket real-time chat</tspan>
  </text>
  <text x="28" y="232" class="mono f8" font-size="13">
    <tspan fill="#374151">└─</tspan>
    <tspan fill="#06B6D4"> Stack</tspan>
    <tspan fill="#6B7280">   Django DRF · Next.js · Celery · Stripe · AWS</tspan>
  </text>

  <!-- ===== SEPARATOR 2 ===== -->
  <line x1="28" y1="248" x2="792" y2="248" stroke="#1C2333" stroke-width="1" class="f9"/>

  <!-- ===== HTOP SKILLS ===== -->
  <text x="28" y="268" class="mono f9" font-size="14">
    <tspan fill="#22C55E">$</tspan>
    <tspan fill="#E6EDF3"> htop --skills</tspan>
  </text>

  <!-- Header labels -->
  <text x="28" y="294" class="mono f10" font-size="11" fill="#6B7280">SKILL</text>
  <text x="150" y="294" class="mono f10" font-size="11" fill="#6B7280">USAGE</text>
  <text x="510" y="294" class="mono f10" font-size="11" fill="#6B7280">STACK</text>

  <!-- ROW 1: Mobile — green bar -->
  <text x="28" y="318" class="mono f10" font-size="14" fill="#06B6D4">Mobile</text>
  <rect x="150" y="305" width="340" height="18" rx="3" fill="url(#track)" class="f10"/>
  <rect x="150" y="305" width="330" height="18" rx="3" fill="#22C55E" opacity="0.85" class="bar1"/>
  <text x="510" y="318" class="mono f10" font-size="13" fill="#6B7280">Flutter, Dart, Riverpod</text>

  <!-- ROW 2: Backend — cyan bar -->
  <text x="28" y="348" class="mono f11" font-size="14" fill="#06B6D4">Backend</text>
  <rect x="150" y="335" width="340" height="18" rx="3" fill="url(#track)" class="f11"/>
  <rect x="150" y="335" width="320" height="18" rx="3" fill="#06B6D4" opacity="0.85" class="bar2"/>
  <text x="510" y="348" class="mono f11" font-size="13" fill="#6B7280">Python, Django, DRF</text>

  <!-- ROW 3: Frontend — purple bar -->
  <text x="28" y="378" class="mono f12" font-size="14" fill="#06B6D4">Frontend</text>
  <rect x="150" y="365" width="340" height="18" rx="3" fill="url(#track)" class="f12"/>
  <rect x="150" y="365" width="290" height="18" rx="3" fill="#7C3AED" opacity="0.85" class="bar3"/>
  <text x="510" y="378" class="mono f12" font-size="13" fill="#6B7280">TypeScript, Next.js, React</text>

  <!-- ROW 4: Cloud — yellow bar -->
  <text x="28" y="408" class="mono f13" font-size="14" fill="#06B6D4">Cloud</text>
  <rect x="150" y="395" width="340" height="18" rx="3" fill="url(#track)" class="f13"/>
  <rect x="150" y="395" width="300" height="18" rx="3" fill="#FEBC2E" opacity="0.85" class="bar4"/>
  <text x="510" y="408" class="mono f13" font-size="13" fill="#6B7280">AWS, GCP, Firebase</text>

  <!-- ROW 5: AI Agent — magenta bar -->
  <text x="28" y="438" class="mono f14" font-size="14" fill="#06B6D4">AI Agent</text>
  <rect x="150" y="425" width="340" height="18" rx="3" fill="url(#track)" class="f14"/>
  <rect x="150" y="425" width="270" height="18" rx="3" fill="#FF00FF" opacity="0.7" class="bar5"/>
  <text x="510" y="438" class="mono f14" font-size="13" fill="#6B7280">LangGraph, Claude, RAG</text>

  <!-- ROW 6: Database — teal bar -->
  <text x="28" y="468" class="mono f15" font-size="14" fill="#06B6D4">Database</text>
  <rect x="150" y="455" width="340" height="18" rx="3" fill="url(#track)" class="f15"/>
  <rect x="150" y="455" width="280" height="18" rx="3" fill="#2DD4BF" opacity="0.8" class="bar6"/>
  <text x="510" y="468" class="mono f15" font-size="13" fill="#6B7280">PostgreSQL, Redis, Supabase</text>

  <!-- ROW 7: DevOps — rose bar -->
  <text x="28" y="498" class="mono f16" font-size="14" fill="#06B6D4">DevOps</text>
  <rect x="150" y="485" width="340" height="18" rx="3" fill="url(#track)" class="f16"/>
  <rect x="150" y="485" width="250" height="18" rx="3" fill="#F43F5E" opacity="0.85" class="bar7"/>
  <text x="510" y="498" class="mono f16" font-size="13" fill="#6B7280">Docker, Sentry, CI/CD</text>

  <!-- ===== SEPARATOR 3 ===== -->
  <line x1="28" y1="516" x2="792" y2="516" stroke="#1C2333" stroke-width="1" class="f16"/>

  <!-- ===== STATUS BAR ===== -->
  <text x="28" y="538" class="mono f17" font-size="13">
    <tspan fill="#6B7280">Mem:</tspan>
    <tspan fill="#22C55E"> coffee</tspan>
    <tspan fill="#6B7280">/</tspan>
    <tspan fill="#E6EDF3">∞</tspan>
    <tspan fill="#6B7280">    Uptime:</tspan>
    <tspan fill="#E6EDF3"> always shipping</tspan>
    <tspan fill="#6B7280">    Load:</tspan>
    <tspan fill="#FEBC2E"> 99%</tspan>
    <tspan fill="#6B7280"> motivation</tspan>
  </text>

  <!-- Color swatches -->
  <rect x="28" y="556" width="16" height="10" rx="2" fill="#22C55E" class="f17"/>
  <rect x="50" y="556" width="16" height="10" rx="2" fill="#06B6D4" class="f17"/>
  <rect x="72" y="556" width="16" height="10" rx="2" fill="#7C3AED" class="f17"/>
  <rect x="94" y="556" width="16" height="10" rx="2" fill="#FEBC2E" class="f17"/>
  <rect x="116" y="556" width="16" height="10" rx="2" fill="#F43F5E" class="f17"/>
  <rect x="138" y="556" width="16" height="10" rx="2" fill="#FF00FF" class="f17"/>
  <rect x="160" y="556" width="16" height="10" rx="2" fill="#2DD4BF" class="f17"/>

  <!-- PID info -->
  <text x="200" y="566" class="mono f17" font-size="11" fill="#374151">Tasks: 7 domains, 20+ technologies    PID: 2025</text>

  <!-- Blinking cursor -->
  <rect x="780" y="554" width="8" height="14" rx="1" fill="#22C55E" class="cursor"/>

</svg>
